<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Generator</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
    color:#fff;
    font-family:sans-serif;
    text-align:center;
}

/* タイトル */
#title{
    font-size:2.5em;
    margin-top:30px;
}

/* ボタン全体 */
#controls{
    width:90%;
    margin:10px auto;
    display:flex;
}

/* Generate */
#generateBtn{
    width:50%;
    font-size:1em;
}

/* 右側エリア */
#rightArea{
    width:50%;
    display:flex;
    flex-direction:column;
}

/* モード */
#modeSelect{
    height:50%;
    font-size:0.9em;
}

/* 下段 */
#bottomBtns{
    height:50%;
    display:flex;
}

#historyBtn, #favBtn{
    width:50%;
    font-size:0.9em;
}

/* 共通ボタン */
button, select{
    background:#111;
    color:#fff;
    border:1px solid #555;
}

/* 出力 */
#output{
    margin-top:10px;
    font-size:1.2em;
}

/* 見出し */
.section-title{
    color:#ff4dff;
    font-size:0.9em;
    margin-top:10px;
    margin-bottom:2px;
}

/* 履歴画面 */
#historyScreen{
    display:none;
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
}

#backBtn{
    position:absolute;
    top:10px;
    left:10px;
}
</style>
</head>

<body>

<div id="mainScreen">

<div id="title">City Generator</div>

<div id="controls">
    <button id="generateBtn">Generate</button>

    <div id="rightArea">
        <select id="modeSelect">
            <option value="cyber">Cyber</option>
            <option value="fantasy">Fantasy</option>
            <option value="real">Real</option>
            <option value="ruin">Ruin</option>
        </select>

        <div id="bottomBtns">
            <button id="historyBtn">History</button>
            <button id="favBtn">⭐︎</button>
        </div>
    </div>
</div>

<div id="output"></div>

</div>

<!-- 履歴画面 -->
<div id="historyScreen">
    <button id="backBtn">戻る</button>
    <div id="historyList"></div>
</div>

<script src="data.js"></script>

<script>
let history = [];

/* モードカラー */
function applyMode(mode){
    const body = document.body;

    switch(mode){
        case "cyber":
            body.style.background = "#000";
            body.style.color = "#0ff";
            break;
        case "fantasy":
            body.style.background = "#1a0033";
            body.style.color = "#ffccff";
            break;
        case "real":
            body.style.background = "#222";
            body.style.color = "#fff";
            break;
        case "ruin":
            body.style.background = "#111";
            body.style.color = "#888";
            break;
    }
}

/* 生成 */
function generate(){
    const mode = document.getElementById("modeSelect").value;
    applyMode(mode);

    const arch = getRandom(data.architecture);
    const env = getRandom(data.environment);

    const html = `
    <div class="section">
        <div class="section-title">建築</div>
        <div>${arch}</div>
    </div>

    <div class="section">
        <div class="section-title">環境</div>
        <div>${env}</div>
    </div>
    `;

    document.getElementById("output").innerHTML = html;

    history.push(html);
}

/* ランダム */
function getRandom(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

/* 履歴表示 */
function showHistory(){
    document.getElementById("mainScreen").style.display="none";
    document.getElementById("historyScreen").style.display="block";

    const list = document.getElementById("historyList");
    list.innerHTML = history.map(h => `<div>${h}</div>`).join("");
}

/* 戻る */
function back(){
    document.getElementById("mainScreen").style.display="block";
    document.getElementById("historyScreen").style.display="none";
}

/* イベント */
document.getElementById("generateBtn").onclick = generate;
document.getElementById("historyBtn").onclick = showHistory;
document.getElementById("backBtn").onclick = back;
</script>

</body>
</html>
