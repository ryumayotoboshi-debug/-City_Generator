<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Generator</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
    overflow:hidden;
    text-align:center;
}

/* タイトル */
.title{
    font-size:26px;
    margin-top:20px;
    margin-bottom:8px;
    text-shadow:0 0 10px #00ffcc;
}

/* 画面切り替え */
.screen{
    display:none;
}
.active{
    display:block;
}

/* ボタンエリア */
.controls{
    display:grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 38px 38px; /* 少し小さく */
    gap:6px;
    padding:6px;
}

/* ボタン */
button{
    background:black;
    color:#00ffcc;
    border:1px solid #00ffcc;
    font-size:12px;
    text-align:center;
    box-shadow:0 0 5px #00ffcc;
}

/* 配置 */
#generateBtn{
    grid-row:1 / span 2;
}

#historyBtn{
    width:48%;
    justify-self:start;
}

#favBtn{
    width:48%;
    justify-self:end;
}

/* 出力 */
#output{
    margin-top:6px;
    font-size:16px;
    line-height:1.6;
}

/* ブロック */
.block{
    margin-bottom:6px;
}

.label{
    color:#ff2bd6;
    font-size:12px;
    text-shadow:0 0 6px #ff2bd6;
    margin-bottom:1px;
}

.value{
    font-size:18px;
}

/* 履歴画面 */
#historyScreen{
    padding:10px;
}

/* 戻るボタン */
#backBtn{
    position:absolute;
    top:10px;
    left:10px;
}

/* カード */
.card{
    border:1px solid #00ffcc;
    margin-bottom:8px;
    padding:6px;
    font-size:12px;
}
.time{
    font-size:10px;
    margin-bottom:4px;
    color:#888;
}
</style>
</head>

<body>

<!-- 生成画面 -->
<div id="mainScreen" class="screen active">

<div class="title">City Generator</div>

<div class="controls">
    <button id="generateBtn">Generate</button>
    <button id="modeBtn">Mode</button>
    <button id="historyBtn">History</button>
    <button id="favBtn">⭐</button>
</div>

<div id="output"></div>

</div>

<!-- 履歴画面 -->
<div id="historyScreen" class="screen">
    <button id="backBtn">戻る</button>
    <h2>History</h2>
    <div id="historyList"></div>
</div>

<script src="data.js"></script>

<script>
let currentMode = "cyberpunk";
let historyData = [];

/* ランダム */
function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

/* 生成 */
function generate(){
    const d = data[currentMode];

    const result = {
        建築: pick(d.architecture),
        環境: pick(d.environment),
        社会: pick(d.society),
        雰囲気: pick(d.mood),
        地区: pick(d.district),
        施設: pick(d.facility),
        職業: pick(d.jobs),
        事件: pick(d.incidents),
        主要人物: pick(d.characters),
        time: new Date().toLocaleString()
    };

    historyData.unshift(result);

    let html = "";
    for(let key in result){
        if(key === "time") continue;
        html += `
        <div class="block">
            <div class="label">${key}</div>
            <div class="value">${result[key]}</div>
        </div>`;
    }

    document.getElementById("output").innerHTML = html;
}

/* モード */
function toggleMode(){
    currentMode = (currentMode === "cyberpunk") ? "apocalypse" : "cyberpunk";
}

/* 履歴表示 */
function showHistory(){
    document.getElementById("mainScreen").classList.remove("active");
    document.getElementById("historyScreen").classList.add("active");

    let html = "";

    historyData.forEach(item=>{
        html += `<div class="card">
        <div class="time">${item.time}</div>`;

        for(let key in item){
            if(key === "time") continue;
            html += `<div>${key}: ${item[key]}</div>`;
        }

        html += `</div>`;
    });

    document.getElementById("historyList").innerHTML = html;
}

/* 戻る */
function back(){
    document.getElementById("historyScreen").classList.remove("active");
    document.getElementById("mainScreen").classList.add("active");
}

/* イベント */
generateBtn.onclick = generate;
modeBtn.onclick = toggleMode;
historyBtn.onclick = showHistory;
backBtn.onclick = back;
favBtn.onclick = ()=>alert("お気に入り未実装");

</script>

</body>
</html>
