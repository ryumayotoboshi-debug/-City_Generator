<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Generator</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
    overflow:hidden; /* スクロールバー削除 */
}

/* 全体レイアウト */
.container{
    display:flex;
    height:100vh;
}

/* 左：Generateボタン */
.left{
    width:35%;
    display:flex;
    justify-content:center;
    align-items:center;
}

#generateBtn{
    width:90%;
    height:90%;
    font-size:14px;
}

/* 右：UI */
.right{
    width:65%;
    position:relative;
    padding:8px;
}

/* 出力 */
#output{
    font-size:11px; /* 小さく */
    white-space:pre-wrap;
    line-height:1.4;
}

/* ボタン共通 */
button{
    background:black;
    color:#00ffcc;
    border:1px solid #00ffcc;
    padding:6px;
    font-size:11px;
}

/* モード切替（右上） */
#modeBtn{
    position:absolute;
    top:5px;
    right:5px;
}

/* 下部ボタン */
.bottom{
    position:absolute;
    bottom:5px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 5px;
}

</style>
</head>

<body>

<div class="container">

    <!-- 左 -->
    <div class="left">
        <button id="generateBtn">Generate</button>
    </div>

    <!-- 右 -->
    <div class="right">

        <button id="modeBtn">Mode</button>

        <div id="output"></div>

        <div class="bottom">
            <button id="historyBtn">History</button>
            <button id="favBtn">⭐</button>
        </div>

    </div>

</div>

<!-- data.js 読み込み -->
<script src="data.js"></script>

<script>
let currentMode = "cyberpunk";

/* ランダム取得 */
function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

/* 生成処理 */
function generate(){
    const d = data[currentMode];

    const result =
`建築: ${pick(d.architecture)}
環境: ${pick(d.environment)}
社会: ${pick(d.society)}
雰囲気: ${pick(d.mood)}
地区: ${pick(d.district)}
施設: ${pick(d.facility)}
職業: ${pick(d.jobs)}
事件: ${pick(d.incidents)}
主要人物: ${pick(d.characters)}`;

    document.getElementById("output").textContent = result;
}

/* モード切替 */
function toggleMode(){
    currentMode = (currentMode === "cyberpunk") ? "apocalypse" : "cyberpunk";
}

/* イベント */
document.getElementById("generateBtn").onclick = generate;
document.getElementById("modeBtn").onclick = toggleMode;

/* 仮（後で機能追加可能） */
document.getElementById("historyBtn").onclick = () => alert("履歴（未実装）");
document.getElementById("favBtn").onclick = () => alert("お気に入り（未実装）");

</script>

</body>
</html>
