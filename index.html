<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Generator</title>

<style>

/* ===== モードカラー変数 ===== */
:root{
    --main:#00ffcc;
    --accent:#ff2bd6;
    --bg:black;
}

/* ===== モード別テーマ ===== */
body.cyberpunk{
    --main:#00ffcc;
    --accent:#ff2bd6;
    --bg:black;
}

body.apocalypse{
    --main:#ff4444;
    --accent:#ffaa00;
    --bg:#1a0000;
}

body.future{
    --main:#66aaff;
    --accent:#ffffff;
    --bg:#001122;
}

body.fantasy{
    --main:#66ff99;
    --accent:#cc66ff;
    --bg:#001a00;
}

/* ===== 基本 ===== */
body{
    margin:0;
    background:var(--bg);
    color:var(--main);
    font-family:monospace;
    overflow:hidden;
    text-align:center;
}

/* タイトル */
.title{
    font-size:30px;
    margin-top:24px;
    margin-bottom:8px;
    text-shadow:0 0 10px var(--main);
}

/* 画面切り替え */
.screen{ display:none; }
.active{ display:block; }

/* ボタンエリア */
.controls{
    display:grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 34px 34px;
    gap:6px;
    padding:6px;
}

/* ボタン共通 */
button, select{
    background:black;
    color:var(--main);
    border:1px solid var(--main);
    font-size:12px;
    text-align:center; /* ←中央配置 */
    box-shadow:0 0 5px var(--main);
}

/* selectの中央寄せを強化 */
#modeSelect{
    width:100%;
    text-align:center;
    text-align-last:center;
}

/* Generate */
#generateBtn{
    grid-row:1 / span 2;
}

/* 下段ボタン（サイズ統一） */
#historyBtn,
#favBtn{
    width:48%;
}

/* 左右配置 */
#historyBtn{ justify-self:start; }
#favBtn{ justify-self:end; }

/* 出力 */
#output{
    margin-top:6px;
    font-size:16px;
    line-height:1.6;
}

/* ブロック */
.block{
    margin-bottom:6px;
}

.label{
    color:var(--accent);
    font-size:12px;
    text-shadow:0 0 6px var(--accent);
    margin-bottom:1px;
}

/* ★ フォントサイズ縮小 */
.value{
    font-size:14px;
}

/* 履歴画面 */
#historyScreen{
    padding:10px;
}

/* 戻るボタン */
#backBtn{
    position:absolute;
    top:10px;
    left:10px;
}

/* カード */
.card{
    border:1px solid var(--main);
    margin-bottom:8px;
    padding:6px;
    font-size:12px;
    text-align:left; /* ← 左揃え */
}

.time{
    font-size:10px;
    margin-bottom:4px;
    color:#888;
}

</style>
</head>

<body class="cyberpunk">

<!-- 生成画面 -->
<div id="mainScreen" class="screen active">

<div class="title">City Generator</div>

<div class="controls">
    <button id="generateBtn">Generate</button>

    <select id="modeSelect">
        <option value="cyberpunk">Cyberpunk</option>
        <option value="apocalypse">Apocalypse</option>
        <option value="future">Future</option>
        <option value="fantasy">Fantasy</option>
    </select>

    <button id="historyBtn">History</button>
    <button id="favBtn">⭐</button>
</div>

<div id="output"></div>

</div>

<!-- 履歴画面 -->
<div id="historyScreen" class="screen">
    <button id="backBtn">戻る</button>
    <h2>History</h2>
    <div id="historyList"></div>
</div>

<script src="data.js"></script>

<script>
let currentMode = "cyberpunk";
let historyData = [];

/* ランダム */
function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

/* 生成 */
function generate(){
    const d = data[currentMode];

    const result = {
        建築: pick(d.architecture),
        環境: pick(d.environment),
        社会: pick(d.society),
        雰囲気: pick(d.mood),
        地区: pick(d.district),
        施設: pick(d.facility),
        職業: pick(d.jobs),
        事件: pick(d.incidents),
        主要人物: pick(d.characters),
        time: new Date().toLocaleString()
    };

    historyData.unshift(result);

    let html = "";
    for(let key in result){
        if(key === "time") continue;
        html += `
        <div class="block">
            <div class="label">${key}</div>
            <div class="value">${result[key]}</div>
        </div>`;
    }

    document.getElementById("output").innerHTML = html;
}

/* モード変更 */
function changeMode(){
    const select = document.getElementById("modeSelect");
    currentMode = select.value;
    document.body.className = currentMode;
}

/* 履歴表示 */
function showHistory(){
    document.getElementById("mainScreen").classList.remove("active");
    document.getElementById("historyScreen").classList.add("active");

    let html = "";

    historyData.forEach(item=>{
        html += `<div class="card">
        <div class="time">${item.time}</div>`;

        for(let key in item){
            if(key === "time") continue;
            html += `<div>${key}: ${item[key]}</div>`;
        }

        html += `</div>`;
    });

    document.getElementById("historyList").innerHTML = html;
}

/* 戻る */
function back(){
    document.getElementById("historyScreen").classList.remove("active");
    document.getElementById("mainScreen").classList.add("active");
}

/* イベント */
generateBtn.onclick = generate;
modeSelect.onchange = changeMode;
historyBtn.onclick = showHistory;
backBtn.onclick = back;
favBtn.onclick = ()=>alert("お気に入り未実装");

</script>

</body>
</html>
