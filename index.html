<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Generator</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0a0a0a;
    color:white;
    text-align:center;
}

/* タイトル */
h1{
    font-size:2.5em;
    margin-top:40px;
    margin-bottom:30px;
}

/* ボタンエリア */
.top-buttons{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:30px;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
    cursor:pointer;
}

/* Generateボタン少し低く */
.generate{
    height:40px;
}

/* 見出し */
.section-title{
    color:#ff4fd8;
    font-size:1em;
    margin-top:60px; /* ←ボタンとの余白拡大 */
    margin-bottom:6px;
}

/* 出力内容 */
.content{
    font-size:1.3em;
    margin-bottom:20px;
}

/* 履歴画面 */
#historyScreen{
    display:none;
    padding:20px;
}

.history-card{
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

/* 2列構成 */
.card-grid{
    display:flex;
    gap:20px;
}

.card-col{
    flex:1;
    text-align:left;
}

/* 履歴内テキスト */
.card-title{
    margin-top:20px;
    margin-bottom:4px; /* 見出しと内容の間を縮小 */
}

/* セクション間余白を拡大 */
.card-col .content{
    margin-bottom:25px;
}

</style>
</head>

<body>

<!-- 生成画面 -->
<div id="mainScreen">

<h1>City Generator</h1>

<div class="top-buttons">
    <button onclick="setMode('Synthwave')">Synthwave</button>
    <button onclick="setMode('DreamCore')">DreamCore</button>
    <button onclick="showHistory()">History</button>
    <button onclick="toggleFavorite()">⭐︎</button>
</div>

<button class="generate" onclick="generateCity()">Generate</button>

<div id="result"></div>

</div>

<!-- 履歴画面 -->
<div id="historyScreen">

<button onclick="backToMain()">戻る</button>

<div id="historyList"></div>

</div>

<script>

let currentMode = "Synthwave";
let historyData = [];

/* モード色 */
function getModeColor(mode){
    if(mode==="Synthwave") return "#ff4fd8";
    if(mode==="DreamCore") return "#4fd8ff";
    return "#fff";
}

function setMode(mode){
    currentMode = mode;
}

/* 生成 */
function generateCity(){

    const data = {
        建築:"ネオンに包まれた高層ビル群",
        環境:"常に夜のような薄暗い空",
        地区:"歓楽街と工業地帯が混在",
        施設:"巨大なデータセンター",
        主要人物:"謎のハッカー"
    };

    displayResult(data, currentMode);

    historyData.push({
        data:data,
        mode:currentMode
    });

}

/* 表示 */
function displayResult(data, mode){

    const color = getModeColor(mode);

    let html = "";

    for(let key in data){
        html += `
        <div class="section-title" style="color:${color}">${key}</div>
        <div class="content">${data[key]}</div>
        `;
    }

    document.getElementById("result").innerHTML = html;
}

/* 履歴表示 */
function showHistory(){

    document.getElementById("mainScreen").style.display="none";
    document.getElementById("historyScreen").style.display="block";

    let html="";

    historyData.forEach(item=>{

        const color = getModeColor(item.mode);

        html += `
        <div class="history-card" style="background:${color}22">

            <button style="float:right">⭐︎</button>

            <div class="card-grid">

                <div class="card-col">
                    <div class="card-title" style="color:${color}">建築</div>
                    <div class="content">${item.data.建築}</div>

                    <div class="card-title" style="color:${color}">環境</div>
                    <div class="content">${item.data.環境}</div>

                    <div class="card-title" style="color:${color}">地区</div>
                    <div class="content">${item.data.地区}</div>
                </div>

                <div class="card-col">
                    <div class="card-title" style="color:${color}">施設</div>
                    <div class="content">${item.data.施設}</div>

                    <div class="card-title" style="color:${color}">主要人物</div>
                    <div class="content">${item.data.主要人物}</div>
                </div>

            </div>

        </div>
        `;
    });

    document.getElementById("historyList").innerHTML = html;
}

function backToMain(){
    document.getElementById("mainScreen").style.display="block";
    document.getElementById("historyScreen").style.display="none";
}

/* お気に入り（仮） */
function toggleFavorite(){
    alert("お気に入り機能（未実装）");
}

</script>

</body>
</html>
